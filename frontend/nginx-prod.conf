# nginx config for the frontend production container (internal)
# This serves the Vite build output on port 80
# The external nginx (nginx.production.conf) proxies to this container

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # Static assets built by Vite have content hashes — cache forever
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # index.html — never cache, needed for SPA routing
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA fallback: every unknown route returns index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
